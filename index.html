<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sounds &amp; Words</title>
<style>
  /* ============================================================
     SOUNDS & WORDS — two gentle phonics games for one student.
       1) Letter Sounds  — hear a phoneme, tap the right letter
       2) Sight Words    — match the two words that are the same
     A friendly caterpillar eats a cupcake and grows on every
     correct answer. No timers, no scores, no losing — calm by
     design (built for a learner recovering from seizure surgery).
     Self-contained single file.
     ============================================================ */
  :root{
    --sky1:#cdefff; --sky2:#eaf9ff;
    --ink:#2b3a4a;
    --grass:#8ad06a; --grass-dark:#6bb84e;
    --sign:#c08a52; --sign-dark:#9a6736;
    --good:#48c97a; --bad:#ff8a8a;
    --card:#ffffff; --gold:#ffd66b;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    /* dyslexia-friendly geometric sans (single-story a/g) */
    font-family:"Century Gothic", CenturyGothic, "Futura", "Trebuchet MS",
                "Segoe UI", system-ui, sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, var(--sky2), var(--sky1) 70%, #b6e6fb 100%);
    overflow:hidden; -webkit-user-select:none; user-select:none;
    touch-action:manipulation;
  }
  .cloud{ position:fixed; background:#fff; border-radius:16px; opacity:.8;
    box-shadow:30px 0 #fff, 60px 0 #fff, 16px -16px #fff, 44px -16px #fff;
    pointer-events:none; }

  /* ---------- screens ---------- */
  .screen{ position:fixed; inset:0; display:none; flex-direction:column;
    align-items:center; }
  .screen.active{ display:flex; }

  /* ---------- top bar ---------- */
  .bar{ width:100%; display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding:12px 16px; }
  .icon-btn{ cursor:pointer; border:none; background:#fff; color:var(--ink);
    width:54px; height:54px; border-radius:16px; font-size:24px;
    box-shadow:0 4px 0 rgba(0,0,0,.10); }
  .icon-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.10); }
  .bar-title{ font-weight:900; font-size:clamp(18px,3.4vw,28px); color:#2f6f9e; }

  /* ---------- HOME ---------- */
  #home{ justify-content:center; gap:26px; padding:20px; }
  .logo{ font-size:clamp(34px,8vw,72px); font-weight:900; color:#2f6f9e;
    text-shadow:0 5px 0 #bfe3f6; text-align:center; line-height:1; }
  .logo small{ display:block; font-size:clamp(15px,3vw,24px); color:#5a8fb0;
    text-shadow:none; margin-top:10px; font-weight:700; }
  .menu{ display:flex; flex-direction:column; gap:20px; width:min(440px,86vw); }
  .menu .big{ cursor:pointer; border:none; font-family:inherit; font-weight:900;
    color:#fff; border-radius:24px; padding:30px 22px; font-size:clamp(22px,5vw,34px);
    display:flex; align-items:center; gap:18px; justify-content:center;
    transition:transform .07s, box-shadow .07s; }
  .menu .big .em{ font-size:1.5em; }
  .menu .big:active{ transform:translateY(5px); }
  .b-letters{ background:linear-gradient(#ffb24d,#f0911f); box-shadow:0 8px 0 #c4720f; }
  .b-letters:active{ box-shadow:0 3px 0 #c4720f; }
  .b-words{ background:linear-gradient(#6cc6ff,#3f9fe0); box-shadow:0 8px 0 #2f78ad; }
  .b-words:active{ box-shadow:0 3px 0 #2f78ad; }

  /* ---------- shared prompt ---------- */
  .prompt{ font-weight:900; color:#2f6f9e; text-align:center;
    font-size:clamp(18px,3.4vw,28px); min-height:1.4em; padding:0 14px;
    text-shadow:0 2px 0 rgba(255,255,255,.6); }

  .play-area{ flex:1; width:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:6px 14px; }

  /* ---------- LETTER cards ---------- */
  .listen{ cursor:pointer; border:none; font-family:inherit; font-weight:900;
    color:#fff; background:linear-gradient(#7bd58f,#48c97a); box-shadow:0 7px 0 #2f9d59;
    border-radius:20px; padding:16px 28px; font-size:clamp(18px,3.4vw,26px);
    display:flex; align-items:center; gap:12px; }
  .listen:active{ transform:translateY(4px); box-shadow:0 3px 0 #2f9d59; }
  .listen .em{ font-size:1.4em; }

  .cards{ display:flex; gap:clamp(12px,3vw,30px); flex-wrap:wrap;
    justify-content:center; }
  .lcard{ cursor:pointer; width:clamp(106px,25vw,168px); aspect-ratio:1/1;
    background:var(--card); border-radius:28px; border:6px solid #e3ecf3;
    box-shadow:0 9px 0 #cdd9e3; display:flex; align-items:center;
    justify-content:center; font-weight:900; color:#3a4a5a;
    font-size:clamp(70px,18vw,130px); transition:transform .07s, box-shadow .07s; }
  .lcard:active{ transform:translateY(4px); box-shadow:0 4px 0 #cdd9e3; }
  .lcard.good{ border-color:var(--good); background:#eafff2; animation:pop .5s; }
  .lcard.bad{ border-color:var(--bad); animation:shake .4s; }
  @keyframes pop{ 0%{transform:scale(1)} 35%{transform:scale(1.12)} 100%{transform:scale(1)} }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)}
    75%{transform:translateX(8px)} }

  /* ---------- WORD signs (whack-a-mole style, calmed down) ---------- */
  .board{ display:grid; grid-template-columns:repeat(2, auto); gap:clamp(14px,4vw,34px);
    justify-content:center; align-content:center; }
  .hole{ position:relative; width:clamp(130px,38vw,230px); aspect-ratio:1/.62;
    cursor:pointer; }
  .mound{ position:absolute; left:4%; right:4%; bottom:0; height:40%;
    background:radial-gradient(120% 160% at 50% 0%, var(--grass) 0 60%, var(--grass-dark) 100%);
    border-radius:50%/70% 70% 100% 100%; box-shadow:inset 0 -6px 0 rgba(0,0,0,.10); }
  .sign{ position:absolute; left:50%; bottom:18%; transform:translate(-50%,120%);
    width:90%; display:flex; flex-direction:column; align-items:center;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1); }
  .hole.up .sign{ transform:translate(-50%,0); }
  .post{ width:12%; height:22px; background:linear-gradient(#a9763f,#7c5125);
    border-radius:3px; margin-bottom:-4px; }
  .plank{ width:100%; padding:14px 8px; border-radius:14px;
    background:linear-gradient(var(--sign),var(--sign-dark)); border:5px solid #6e481f;
    box-shadow:0 6px 0 #5c3a18, inset 0 3px 0 rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center; }
  .word{ font-weight:900; color:#fff5e6; letter-spacing:.5px;
    font-size:clamp(28px,7vw,54px); text-shadow:0 2px 0 rgba(0,0,0,.35); }
  .hole.sel .plank{ background:linear-gradient(#ffe79a,#f0bf3a);
    border-color:#b97f00; box-shadow:0 6px 0 #a06d00, 0 0 0 5px var(--gold); }
  .hole.sel .word{ color:#5a3d00; text-shadow:0 1px 0 rgba(255,255,255,.4); }
  .hole.good .plank{ background:linear-gradient(#8df0a8,#3ec96b); border-color:#1c8442;
    animation:pop .5s; }
  .hole.bad .plank{ animation:shake .4s; }

  /* ---------- caterpillar reward track (shared) ---------- */
  .track{ position:relative; width:100%; height:150px; flex:0 0 auto;
    background:linear-gradient(#cdeebf 0 60%, var(--grass) 60% 74%, var(--grass-dark) 74% 100%);
    overflow:hidden; touch-action:none; }

  /* the cupcake the child SLIDES to the caterpillar's mouth */
  .cake{ position:absolute; bottom:30px; font-size:54px; line-height:1; cursor:grab;
    touch-action:none; -webkit-user-select:none; user-select:none; z-index:4;
    transition:transform .25s; filter:drop-shadow(0 5px 3px rgba(0,0,0,.22)); }
  .cake.active{ animation:cakepulse 1s ease-in-out infinite; }   /* "drag me!" hint */
  .cake.dragging{ cursor:grabbing; animation:none; }
  .cake.eaten{ transition:transform .25s ease-in; transform:scale(0) translateY(-22px); }
  @keyframes cakepulse{ 0%,100%{ transform:translateY(0) scale(1);} 50%{ transform:translateY(-9px) scale(1.07);} }

  /* the capybara — face on the RIGHT, looking toward the cupcake */
  .capy{ position:absolute; bottom:14px; left:18px; width:124px; z-index:3;
    transform-origin:left bottom; transition:transform .4s; pointer-events:none; }
  .capy-inner{ transform-origin:center bottom; }
  .capy.eat .capy-inner{ animation:chomp .4s; }
  .capy-svg{ display:block; width:100%; height:auto;
    animation:capbob 1.1s ease-in-out infinite; transform-origin:center bottom; }
  .capy .leg{ transform-box:fill-box; transform-origin:center top; }
  .capy .leg1{ animation:legA .6s ease-in-out infinite; }
  .capy .leg2{ animation:legB .6s ease-in-out infinite; }
  /* mouth crossfades open as the cupcake comes near */
  .capy .m-open{ opacity:0; transition:opacity .12s; }
  .capy .m-closed{ opacity:1; transition:opacity .12s; }
  .capy.mouthopen .m-open{ opacity:1; }
  .capy.mouthopen .m-closed{ opacity:0; }
  @keyframes capbob{ 0%,100%{ transform:translateY(0) rotate(0); } 50%{ transform:translateY(-4px) rotate(-1.5deg); } }
  @keyframes legA{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-3px); } }
  @keyframes legB{ 0%,100%{ transform:translateY(-3px); } 50%{ transform:translateY(0); } }
  @keyframes chomp{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.12); } }

  /* ---------- keyword picture in a speech bubble (Letter Sounds) ---------- */
  .lrow{ display:flex; align-items:center; justify-content:center;
    gap:clamp(12px,3vw,32px); flex-wrap:wrap; }
  .bubble{ position:relative; background:linear-gradient(#fffdf6,#fff4d9);
    border:5px solid #ffe1a3; border-radius:44px; padding:14px;
    box-shadow:0 8px 0 #f0d394; }
  .bubble-pic{ width:clamp(94px,20vw,150px); height:clamp(94px,20vw,150px); }
  .bubble-pic svg{ width:100%; height:100%; display:block; }
  /* little tail pointing right, toward the letter choices */
  .bubble::before{ content:""; position:absolute; right:-30px; top:50%;
    transform:translateY(-50%); border:17px solid transparent; border-left-color:#ffe1a3; }
  .bubble::after{ content:""; position:absolute; right:-21px; top:50%;
    transform:translateY(-50%); border:13px solid transparent; border-left-color:#fff7e2; }
  @media (max-width:560px){ .bubble::before, .bubble::after{ display:none; } }

  /* ---------- celebration ---------- */
  .star{ position:fixed; font-size:26px; pointer-events:none; z-index:40; }
  @keyframes rise{ to{ transform:translateY(-120px) rotate(40deg); opacity:0; } }
  .banner{ position:fixed; inset:0; display:none; align-items:center;
    justify-content:center; z-index:60; pointer-events:none; }
  .banner.show{ display:flex; }
  .banner .pop{ font-size:clamp(46px,13vw,120px); font-weight:900; color:#fff;
    text-shadow:0 6px 0 #48c97a, 0 12px 22px rgba(0,0,0,.25);
    animation:popin .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popin{ from{ transform:scale(0) rotate(-10deg); opacity:0 } to{ transform:scale(1); opacity:1 } }

  .hidden{ display:none !important; }
</style>
</head>
<body>
  <div class="cloud" style="top:10%; left:8%; transform:scale(1)"></div>
  <div class="cloud" style="top:18%; right:10%; transform:scale(.7)"></div>

  <!-- =================== HOME =================== -->
  <section id="home" class="screen active">
    <div class="logo">🐛 Sounds &amp; Words
      <small>Tap a game to start</small>
    </div>
    <div class="menu">
      <button class="big b-letters" data-go="letters">
        <span class="em">🔤</span> Letter Sounds</button>
      <button class="big b-words" data-go="words">
        <span class="em">📖</span> Sight Words</button>
    </div>
  </section>

  <!-- =================== LETTER SOUNDS =================== -->
  <section id="letters" class="screen">
    <div class="bar">
      <button class="icon-btn" data-home>🏠</button>
      <div class="bar-title">🔤 Letter Sounds</div>
      <button class="icon-btn mutebtn" title="Sound on/off">🔊</button>
    </div>
    <div class="play-area">
      <div class="prompt" id="lPrompt">Listen…</div>
      <button class="listen" id="lListen"><span class="em">🔈</span> Listen again</button>
      <div class="lrow">
        <div class="bubble"><div class="bubble-pic" id="lPic"></div></div>
        <div class="cards" id="lCards"></div>
      </div>
    </div>
    <div class="track" id="lTrack"></div>
  </section>

  <!-- =================== SIGHT WORDS =================== -->
  <section id="words" class="screen">
    <div class="bar">
      <button class="icon-btn" data-home>🏠</button>
      <div class="bar-title">📖 Sight Words</div>
      <button class="icon-btn mutebtn" title="Sound on/off">🔊</button>
    </div>
    <div class="play-area">
      <div class="prompt" id="wPrompt">Find the two words that are the same!</div>
      <div class="board" id="wBoard"></div>
    </div>
    <div class="track" id="wTrack"></div>
  </section>

  <!-- celebration banner -->
  <div class="banner" id="banner"><div class="pop" id="bannerText">YES!</div></div>

<script>
/* ============================================================
   DATA
   ============================================================ */
// each letter -> its phoneme audio + a keyword (sound + picture word)
const LETTERS = {
  a:{ kw:"apple",    kwFile:"apple.m4a",    file:"a.m4a" },
  e:{ kw:"elephant", kwFile:"elephant.m4a", file:"e.m4a" },
  i:{ kw:"igloo",    kwFile:"igloo.m4a",    file:"i.m4a" },
  o:{ kw:"octopus",  kwFile:"octopus.m4a",  file:"o.m4a" },
  u:{ kw:"up",       kwFile:"up.m4a",       file:"u.m4a" },
  b:{ kw:"ball",     kwFile:"ball.m4a",     file:"b.m4a" },
  c:{ kw:"cake",     kwFile:"cake.m4a",     file:"c.m4a" },
  d:{ kw:"dog",      kwFile:"dog.m4a",      file:"d.m4a" },
  f:{ kw:"fish",     kwFile:"fish.m4a",     file:"f.m4a" },
  g:{ kw:"go",       kwFile:"go.m4a",       file:"g.m4a" },

const LETTER_KEYS = Object.keys(LETTERS);
const SIGHT_WORDS = ["the","to","and","is"];

/* coloured illustrations for each keyword (shown in the speech bubble) */
const KEYWORD_ART = {
  apple:`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

    <path d="M38 74 a13 13 0 0 1 24 0 Z" fill="#cfe3f2" stroke="#bcd5e8" stroke-width="2"/></svg>`,
  octopus:`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M28 66 q-10 14 -4 28 q8 -2 8 -16" fill="#a64fb8"/>

  up:`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="40" fill="#3ec96b"/>

/* ============================================================
   HELPERS
   ============================================================ */
const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const shuffle = a => { for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; };

let muted = false;

/* ---------- recorded audio (one element, played in sequence) ---------- */
let audioStop = null;             // cancels any running audio chain
function stopAudio(){ if(audioStop){ audioStop(); audioStop=null; } speechSynthesis.cancel(); }

// play a list of steps in order. A step is {audio:"path"} or {say:"text"}.
function playSequence(steps, done){
  stopAudio();
  if(muted){ if(done) done(); return; }
  let i = 0, cancelled = false, current = null;
  audioStop = ()=>{ cancelled=true; if(current){ current.pause(); current.onended=null; current.onerror=null; } };
  const next = ()=>{
    if(cancelled) return;
    if(i >= steps.length){ audioStop=null; if(done) done(); return; }
    const step = steps[i++];
    if(step.say){
      const u = new SpeechSynthesisUtterance(step.say);
      u.rate = .85; u.pitch = 1.05;
      u.onend = next; u.onerror = next;
      // small safety in case speech never fires
      const t = setTimeout(next, 1500);
      u.onend = ()=>{ clearTimeout(t); next(); };
      speechSynthesis.speak(u);
    } else {
      const a = new Audio(step.audio);
      current = a;
      a.onended = next;
      a.onerror = ()=> setTimeout(next, 200);
      a.play().catch(()=> setTimeout(next, 200));
    }
  };
  next();
}

/* ---------- simple TTS (sight words) ---------- */
function say(text, done){
  stopAudio();
  if(muted || !('speechSynthesis' in window)){ if(done) setTimeout(done,400); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.rate = .8; u.pitch = 1.05;
  u.onend = done; u.onerror = done;
  speechSynthesis.speak(u);
}

/* ============================================================
   CATERPILLAR REWARD (shared by both games)
   Each correct answer: the caterpillar crawls to a cupcake,
   eats it, and grows one segment longer + a little bigger.
   ============================================================ */
function capybaraSVG(){

    <rect class="leg leg2" x="104" y="96" width="18" height="20" rx="8" fill="#a9743f"/>

    <ellipse cx="132" cy="48" rx="11" ry="13" fill="#9c6a3e"/>
    <ellipse cx="108" cy="49" rx="5" ry="6" fill="#7d5430"/>
    <ellipse cx="132" cy="49" rx="5" ry="6" fill="#7d5430"/>
    <rect x="12" y="46" width="140" height="60" rx="30" fill="#c08a55"/>
    <ellipse cx="74" cy="92" rx="56" ry="14" fill="#cf9b66" opacity=".6"/>
    <ellipse cx="138" cy="84" rx="22" ry="18" fill="#cf9b66"/>
    <ellipse cx="120" cy="82" rx="7" ry="4.5" fill="#ff9bb0" opacity=".45"/>
    <circle cx="118" cy="66" r="5.5" fill="#2b2b2b"/><circle cx="140" cy="66" r="5.5" fill="#2b2b2b"/>
    <circle cx="120" cy="64" r="1.8" fill="#fff"/><circle cx="142" cy="64" r="1.8" fill="#fff"/>
    <ellipse cx="143" cy="80" rx="2.2" ry="1.8" fill="#5a3b25"/>
    <ellipse cx="151" cy="80" rx="2.2" ry="1.8" fill="#5a3b25"/>
    <path class="m-closed" d="M140 90 q7 6 14 0" stroke="#5a3b25" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse class="m-open mouth-anchor" cx="148" cy="92" rx="7.5" ry="6.5" fill="#7a3b2a"/>
    <ellipse class="m-open" cx="148" cy="95" rx="5" ry="3.5" fill="#ff7a8a"/>
  </svg>`;
}

// the reward pet: a cute capybara the child feeds by sliding the cupcake to its
// mouth. It opens up as the cupcake nears, chomps, and grows bigger each time.
class Capybara{
  constructor(trackEl){
    this.track = trackEl;
    this.scale = 1;
    this.active = false; this.dragging = false; this.eaten = false;
    this.pendingDone = null;
    this.build();
  }
  build(){
    this.track.innerHTML = '';
    this.capy = document.createElement('div');
    this.capy.className = 'capy';
    this.capy.innerHTML = `<div class="capy-inner">${capybaraSVG()}</div>`;
    this.cake = document.createElement('div');
    this.cake.className = 'cake';
    this.cake.textContent = '🧁';
    this.track.appendChild(this.capy);
    this.track.appendChild(this.cake);
    this.applyScale();
    this.reset();
    // slide-to-feed (pointer events cover both touch and mouse)
    this.cake.addEventListener('pointerdown', e=> this.onDown(e));
    window.addEventListener('pointermove',   e=> this.onMove(e));
    window.addEventListener('pointerup',     e=> this.onUp(e));
    window.addEventListener('pointercancel', e=> this.onUp(e));
  }
  applyScale(){ this.capy.style.transform = `scale(${this.scale})`; }
  // fresh cupcake resting on the right, nothing draggable yet
  reset(){
    this.active = false; this.dragging = false; this.eaten = false;
    this.capy.classList.remove('mouthopen','eat');
    this.cake.classList.remove('eaten','active','dragging');
    this.cake.style.transition = 'transform .25s';
    const w = this.track.clientWidth || 360;
    this.homeX = Math.max(170, w - 84);
    this.cake.style.left = this.homeX + 'px';
    this.cake.style.bottom = '30px';
  }
  // called on a correct answer — let the child slide the cupcake to the mouth
  feed(done){
    this.pendingDone = done; this.eaten = false; this.active = true;
    this.cake.classList.add('active');
  }
  mouthRect(){ return this.capy.querySelector('.mouth-anchor').getBoundingClientRect(); }
  cakeDistance(){
    const h = this.mouthRect(), c = this.cake.getBoundingClientRect();
    return Math.hypot((c.left+c.width/2)-(h.left+h.width/2),
                      (c.top +c.height/2)-(h.top +h.height/2));
  }
  onDown(e){
    if(!this.active || this.eaten) return;
    this.dragging = true;
    this.cake.classList.add('dragging');
    this.cake.classList.remove('active');
    this.cake.style.transition = 'none';
    try{ this.cake.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault();
  }
  onMove(e){
    if(!this.dragging) return;
    const tr = this.track.getBoundingClientRect();
    const x = Math.max(20, Math.min(tr.width-20, e.clientX - tr.left));
    const y = e.clientY - tr.top;
    let bottom = tr.height - y - this.cake.offsetHeight/2;
    bottom = Math.max(8, Math.min(tr.height-44, bottom));
    this.cake.style.left = (x - this.cake.offsetWidth/2) + 'px';
    this.cake.style.bottom = bottom + 'px';
    const d = this.cakeDistance();
    this.capy.classList.toggle('mouthopen', d < 95);   // open up near the cupcake
    if(d < 50) this.eat();
  }
  onUp(e){
    if(!this.dragging) return;
    this.dragging = false;
    this.cake.classList.remove('dragging');
    try{ this.cake.releasePointerCapture(e.pointerId); }catch(_){}
    if(this.eaten || !this.active) return;
    this.glideToMouth();          // forgiving: finish the trip for her
  }
  // glide the cupcake the rest of the way into the open mouth, then eat
  glideToMouth(){
    const h = this.mouthRect(), tr = this.track.getBoundingClientRect();
    const left   = (h.left - tr.left) + h.width/2 - this.cake.offsetWidth/2 + 4;
    const bottom = tr.height - ((h.top - tr.top) + h.height/2) - this.cake.offsetHeight/2;
    this.capy.classList.add('mouthopen');
    this.cake.style.transition = 'left .5s ease-in, bottom .5s ease-in';
    this.cake.style.left = left + 'px';
    this.cake.style.bottom = Math.max(8, bottom) + 'px';
    const t = setTimeout(()=>{ if(!this.eaten) this.eat(); }, 540);
    this.cake.addEventListener('transitionend',
      ()=>{ clearTimeout(t); if(!this.eaten) this.eat(); }, {once:true});
  }
  // chomp, grow bigger, then load the next round
  eat(){
    if(this.eaten) return;
    this.eaten = true; this.active = false; this.dragging = false;
    this.capy.classList.add('eat','mouthopen');
    this.cake.classList.add('eaten');
    setTimeout(()=> this.capy.classList.remove('mouthopen'), 250);
    setTimeout(()=>{
      this.capy.classList.remove('eat');
      this.scale = Math.min(1.6, this.scale + 0.06);   // grows bigger each cupcake
      this.applyScale();
      const done = this.pendingDone; this.pendingDone = null;
      setTimeout(()=>{ this.reset(); if(done) done(); }, 500);
    }, 420);
  }
}

/* ============================================================
   CELEBRATION
   ============================================================ */
const PRAISE = ["YES!","GREAT!","WOW!","SUPER!","YAY!","NICE!"];
function banner(){
  const b = $('#banner');
  $('#bannerText').textContent = PRAISE[Math.random()*PRAISE.length|0];
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'), 850);
}
function stars(x,y){
  const e = ["⭐","🌟","✨","💫"];
  for(let i=0;i<10;i++){
    const s = document.createElement('div');
    s.className='star'; s.textContent = e[i%e.length];
    s.style.left = (x + (Math.random()*120-60)) + 'px';
    s.style.top  = (y + (Math.random()*40-20)) + 'px';
    s.style.animation = `rise ${0.8+Math.random()*0.6}s ease-out forwards`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1500);
  }
}

/* ============================================================
   SCREEN ROUTING
   ============================================================ */
function show(id){
  stopAudio();
  $$('.screen').forEach(s=>s.classList.remove('active'));
  $('#'+id).classList.add('active');
}
$$('[data-home]').forEach(b=> b.addEventListener('click', ()=> show('home')));
$$('.menu .big').forEach(b=> b.addEventListener('click', ()=>{
  const go = b.dataset.go;
  // a tap unlocks audio on most browsers
  if('speechSynthesis' in window) speechSynthesis.resume?.();
  if(go==='letters') startLetters();
  else startWords();
}));
$$('.mutebtn').forEach(b=> b.addEventListener('click', ()=>{
  muted = !muted;
  $$('.mutebtn').forEach(x=> x.textContent = muted ? '🔇' : '🔊');
  if(muted) stopAudio();
}));

/* ============================================================
   GAME 1 — LETTER SOUNDS
   Hear:  /sound/  ·  keyword  ·  "Find" /sound/
   Then tap the matching letter (2 choices).
   ============================================================ */
const L = { target:null, locked:false, bag:[], cat:null };

function startLetters(){
  show('letters');
  if(!L.cat) L.cat = new Capybara($('#lTrack'));
  L.cat.reset();
  L.bag = [];
  letterRound();
}

function nextLetter(){
  if(L.bag.length===0) L.bag = shuffle([...LETTER_KEYS]);
  return L.bag.pop();
}

function letterRound(){
  L.locked = false;
  L.target = nextLetter();
  const distractor = shuffle(LETTER_KEYS.filter(k=>k!==L.target))[0];
  const choices = shuffle([L.target, distractor]);

  $('#lPic').innerHTML = KEYWORD_ART[LETTERS[L.target].kw] || '';   // keyword picture

  const cards = $('#lCards');
  cards.innerHTML = '';
  choices.forEach(letter=>{
    const c = document.createElement('div');
    c.className = 'lcard';
    c.textContent = letter;
    c.addEventListener('click', ()=> pickLetter(letter, c));
    cards.appendChild(c);
  });

  $('#lPrompt').textContent = 'Listen…';
  playPrompt();
}

// audio: phoneme  ->  keyword  ->  "Find" (recorded)  ->  phoneme again
function playPrompt(){
  const d = LETTERS[L.target];
  playSequence([
    { audio:`audio/letters/${d.file}` },
    { audio:`audio/keywords/${d.kwFile}` },
    { audio:`audio/keywords/find.m4a` },
    { audio:`audio/letters/${d.file}` },
  ], ()=>{ $('#lPrompt').textContent = 'Tap the letter you heard'; });
}
$('#lListen').addEventListener('click', playPrompt);

function pickLetter(letter, el){
  if(L.locked) return;
  if(letter === L.target){
    L.locked = true;
    el.classList.add('good');
    const r = el.getBoundingClientRect();
    stars(r.left + r.width/2, r.top + r.height/2);
    banner();
    $('#lPrompt').textContent = '🧁 Slide the cupcake to the capybara!';
    L.cat.feed(()=> letterRound());
  } else {
    el.classList.add('bad');
    $('#lPrompt').textContent = 'Try again — listen!';
    setTimeout(()=>{ el.classList.remove('bad'); playPrompt(); }, 700);
  }
}

/* ============================================================
   GAME 2 — SIGHT WORDS  (whack-a-mole matching, calmed down)
   Two signs show the SAME word — tap them both.
   ============================================================ */
const W = { board:[], target:"", selected:[], locked:false, bag:[], cat:null };

function startWords(){
  show('words');
  if(!W.cat) W.cat = new Capybara($('#wTrack'));
  W.cat.reset();
  W.bag = [];
  wordRound();
}

function nextWord(){
  if(W.bag.length===0) W.bag = shuffle([...SIGHT_WORDS]);
  return W.bag.pop();
}

function wordRound(){
  W.locked = false;
  W.selected = [];
  W.target = nextWord();
  const distractors = shuffle(SIGHT_WORDS.filter(w=>w!==W.target)).slice(0,2);
  W.board = shuffle([W.target, W.target, ...distractors]);   // 4 signs: 2 same + 2 others

  const board = $('#wBoard');
  board.innerHTML = '';
  W.board.forEach((w,i)=>{
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.dataset.i = i;
    hole.innerHTML = `<div class="mound"></div>
      <div class="sign"><div class="post"></div>
        <div class="plank"><span class="word">${w}</span></div></div>`;
    hole.addEventListener('click', ()=> pickSign(i));
    board.appendChild(hole);
  });
  $('#wPrompt').textContent = '🔍 Find the two words that are the same!';

  // pop the signs up with a gentle stagger
  shuffle([...board.children]).forEach((h,k)=> setTimeout(()=> h.classList.add('up'), 120 + k*110));
}

function pickSign(i){
  if(W.locked) return;
  const els = [...$('#wBoard').children];
  const el = els[i];
  if(!el.classList.contains('up')) return;

  const at = W.selected.indexOf(i);
  if(at>=0){ W.selected.splice(at,1); el.classList.remove('sel'); return; }  // tap again to unselect
  if(W.selected.length>=2) return;
  W.selected.push(i);
  el.classList.add('sel');
  if(W.selected.length===2) checkPair();
}

function checkPair(){
  const [a,b] = W.selected;
  const els = [...$('#wBoard').children];
  if(W.board[a] === W.board[b]){
    W.locked = true;
    const word = W.board[a];
    els[a].classList.add('good'); els[b].classList.add('good');
    const r = els[a].getBoundingClientRect();
    stars(r.left + r.width/2, r.top + r.height/2);
    banner();
    // computer reads the matched word, then the child feeds the caterpillar
    $('#wPrompt').innerHTML = `🔊 <b>“${word}”</b> — 🧁 slide the cupcake to the capybara!`;
    say(word);
    W.cat.feed(()=> wordRound());
  } else {
    els[a].classList.add('bad'); els[b].classList.add('bad');
    $('#wPrompt').textContent = 'Not the same — try again!';
    setTimeout(()=>{
      els[a].classList.remove('bad','sel'); els[b].classList.remove('bad','sel');
      W.selected = [];
      $('#wPrompt').textContent = '🔍 Find the two words that are the same!';
    }, 700);
  }
}
</script>
