<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sounds &amp; Words</title>
<style>
  /* ============================================================
     SOUNDS & WORDS — two gentle phonics games for one student.
       1) Letter Sounds  — hear a phoneme, tap the right letter
       2) Sight Words    — match the two words that are the same
     A friendly caterpillar eats a cupcake and grows on every
     correct answer. No timers, no scores, no losing — calm by
     design (built for a learner recovering from seizure surgery).
     Self-contained single file.
     ============================================================ */
  :root{
    --sky1:#cdefff; --sky2:#eaf9ff;
    --ink:#2b3a4a;
    --grass:#8ad06a; --grass-dark:#6bb84e;
    --sign:#c08a52; --sign-dark:#9a6736;
    --good:#48c97a; --bad:#ff8a8a;
    --card:#ffffff; --gold:#ffd66b;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    /* dyslexia-friendly geometric sans (single-story a/g) */
    font-family:"Century Gothic", CenturyGothic, "Futura", "Trebuchet MS",
                "Segoe UI", system-ui, sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, var(--sky2), var(--sky1) 70%, #b6e6fb 100%);
    overflow:hidden; -webkit-user-select:none; user-select:none;
    touch-action:manipulation;
  }
  .cloud{ position:fixed; background:#fff; border-radius:16px; opacity:.8;
    box-shadow:30px 0 #fff, 60px 0 #fff, 16px -16px #fff, 44px -16px #fff;
    pointer-events:none; }

  /* ---------- screens ---------- */
  .screen{ position:fixed; inset:0; display:none; flex-direction:column;
    align-items:center; }
  .screen.active{ display:flex; }

  /* ---------- top bar ---------- */
  .bar{ width:100%; display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding:12px 16px; }
  .icon-btn{ cursor:pointer; border:none; background:#fff; color:var(--ink);
    width:54px; height:54px; border-radius:16px; font-size:24px;
    box-shadow:0 4px 0 rgba(0,0,0,.10); }
  .icon-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.10); }
  .bar-title{ font-weight:900; font-size:clamp(18px,3.4vw,28px); color:#2f6f9e; }

  /* ---------- HOME ---------- */
  #home{ justify-content:flex-start; gap:20px; padding:20px; overflow-y:auto; }
  #home > *:first-child{ margin-top:auto; }
  #home > *:last-child{ margin-bottom:auto; }
  .logo{ font-size:clamp(34px,8vw,72px); font-weight:900; color:#2f6f9e;
    text-shadow:0 5px 0 #bfe3f6; text-align:center; line-height:1; }
  .logo small{ display:block; font-size:clamp(15px,3vw,24px); color:#5a8fb0;
    text-shadow:none; margin-top:10px; font-weight:700; }
  .logo-capy{ display:block; margin:0 auto 12px; }
  .logo-capy svg{ width:100%; height:auto; display:block; }
  .logo-capy img{ height:clamp(120px,26vw,168px); width:auto; display:block; margin:0 auto; -webkit-user-drag:none; }
  .menu{ display:flex; flex-direction:column; gap:20px; width:min(440px,86vw); }
  .menu .big{ cursor:pointer; border:none; font-family:inherit; font-weight:900;
    color:#fff; border-radius:24px; padding:30px 22px; font-size:clamp(22px,5vw,34px);
    display:flex; align-items:center; gap:18px; justify-content:center;
    transition:transform .07s, box-shadow .07s; }
  .menu .big .em{ font-size:1.5em; }
  .menu .big:active{ transform:translateY(5px); }
  .b-letters{ background:linear-gradient(#ffb24d,#f0911f); box-shadow:0 8px 0 #c4720f; }
  .b-letters:active{ box-shadow:0 3px 0 #c4720f; }
  .b-words{ background:linear-gradient(#6cc6ff,#3f9fe0); box-shadow:0 8px 0 #2f78ad; }
  .b-words:active{ box-shadow:0 3px 0 #2f78ad; }
  .b-trace{ background:linear-gradient(#8ad06a,#5fb350); box-shadow:0 8px 0 #47913c; }
  .b-trace:active{ box-shadow:0 3px 0 #47913c; }
  .b-race{ background:linear-gradient(#ff9a5c,#ef6d3a); box-shadow:0 8px 0 #c9521f; }
  .b-race:active{ box-shadow:0 3px 0 #c9521f; }

  /* ---------- shared prompt ---------- */
  .prompt{ font-weight:900; color:#2f6f9e; text-align:center;
    font-size:clamp(18px,3.4vw,28px); min-height:1.4em; padding:0 14px;
    text-shadow:0 2px 0 rgba(255,255,255,.6); }

  .play-area{ flex:1; width:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:6px 14px; }

  /* ---------- LETTER cards ---------- */
  .listen{ cursor:pointer; border:none; font-family:inherit; font-weight:900;
    color:#fff; background:linear-gradient(#7bd58f,#48c97a); box-shadow:0 7px 0 #2f9d59;
    border-radius:20px; padding:16px 28px; font-size:clamp(18px,3.4vw,26px);
    display:flex; align-items:center; gap:12px; }
  .listen:active{ transform:translateY(4px); box-shadow:0 3px 0 #2f9d59; }
  .listen .em{ font-size:1.4em; }

  .cards{ display:flex; gap:clamp(12px,3vw,30px); flex-wrap:wrap;
    justify-content:center; }
  .lcard{ cursor:pointer; width:clamp(106px,25vw,168px); aspect-ratio:1/1;
    background:var(--card); border-radius:28px; border:6px solid #e3ecf3;
    box-shadow:0 9px 0 #cdd9e3; display:flex; align-items:center;
    justify-content:center; font-weight:900; color:#3a4a5a; overflow:hidden;
    font-size:clamp(62px,16vw,116px); padding-bottom:.2em;   /* room for descenders (j, g, p, y) */
    transition:transform .07s, box-shadow .07s, opacity .2s; }
  .lcard:active{ transform:translateY(4px); box-shadow:0 4px 0 #cdd9e3; }
  /* while the prompt is playing, the letters are frozen (can't be tapped yet) */
  .cards.listening .lcard{ opacity:.4; pointer-events:none; }
  .lcard.good{ border-color:var(--good); background:#eafff2; animation:pop .5s; }
  .lcard.bad{ border-color:var(--bad); animation:shake .4s; }
  @keyframes pop{ 0%{transform:scale(1)} 35%{transform:scale(1.12)} 100%{transform:scale(1)} }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)}
    75%{transform:translateX(8px)} }

  /* ---------- WORD signs (whack-a-mole style, calmed down) ---------- */
  .board{ display:grid; grid-template-columns:repeat(2, auto); gap:clamp(14px,4vw,34px);
    justify-content:center; align-content:center; }
  .hole{ position:relative; width:clamp(130px,38vw,230px); aspect-ratio:1/.62;
    cursor:pointer; }
  .mound{ position:absolute; left:4%; right:4%; bottom:0; height:40%;
    background:radial-gradient(120% 160% at 50% 0%, var(--grass) 0 60%, var(--grass-dark) 100%);
    border-radius:50%/70% 70% 100% 100%; box-shadow:inset 0 -6px 0 rgba(0,0,0,.10); }
  .sign{ position:absolute; left:50%; bottom:18%; transform:translate(-50%,120%);
    width:90%; display:flex; flex-direction:column; align-items:center;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1); }
  .hole.up .sign{ transform:translate(-50%,0); }
  .post{ width:12%; height:22px; background:linear-gradient(#a9763f,#7c5125);
    border-radius:3px; margin-bottom:-4px; }
  .plank{ width:100%; padding:14px 8px; border-radius:14px;
    background:linear-gradient(var(--sign),var(--sign-dark)); border:5px solid #6e481f;
    box-shadow:0 6px 0 #5c3a18, inset 0 3px 0 rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center; }
  .word{ font-weight:900; color:#fff5e6; letter-spacing:.5px;
    font-size:clamp(28px,7vw,54px); text-shadow:0 2px 0 rgba(0,0,0,.35); }
  .hole.sel .plank{ background:linear-gradient(#ffe79a,#f0bf3a);
    border-color:#b97f00; box-shadow:0 6px 0 #a06d00, 0 0 0 5px var(--gold); }
  .hole.sel .word{ color:#5a3d00; text-shadow:0 1px 0 rgba(255,255,255,.4); }
  .hole.good .plank{ background:linear-gradient(#8df0a8,#3ec96b); border-color:#1c8442;
    animation:pop .5s; }
  .hole.bad .plank{ animation:shake .4s; }

  /* ---------- caterpillar reward track (shared) ---------- */
  .track{ position:relative; width:100%; height:190px; flex:0 0 auto;
    background:linear-gradient(#cdeebf 0 60%, var(--grass) 60% 74%, var(--grass-dark) 74% 100%);
    overflow:hidden; touch-action:none; }

  /* the cupcake the child SLIDES to the caterpillar's mouth */
  .cake{ position:absolute; bottom:30px; line-height:0; cursor:grab;
    touch-action:none; -webkit-user-select:none; user-select:none; z-index:4;
    transition:transform .25s; filter:drop-shadow(0 5px 3px rgba(0,0,0,.22)); }
  .cake svg{ width:60px; height:60px; display:block; pointer-events:none; }
  .cake.active{ animation:cakepulse 1s ease-in-out infinite; }   /* "drag me!" hint */
  .cake.dragging{ cursor:grabbing; animation:none; }
  .cake.eaten{ transition:transform .25s ease-in; transform:scale(0) translateY(-22px); }
  @keyframes cakepulse{ 0%,100%{ transform:translateY(0) scale(1);} 50%{ transform:translateY(-9px) scale(1.07);} }

  /* the capybara — face on the RIGHT, looking toward the cupcake */
  .capy{ position:absolute; bottom:16px; left:20px; width:auto; z-index:3;
    transform-origin:left bottom; pointer-events:none;
    transition:transform .6s cubic-bezier(.34,1.6,.5,1); }   /* springy growth */
  .capy-inner{ position:relative; transform-origin:center bottom; }
  .capy.eat .capy-inner{ animation:chomp .4s; }
  .capy.grow .capy-inner{ animation:growpop .65s ease; }      /* extra happy bounce */
  @keyframes growpop{ 0%{ transform:scale(1); } 35%{ transform:scale(1.25); }
    70%{ transform:scale(.95); } 100%{ transform:scale(1); } }
  .pet-img{ display:block; height:100px; width:auto; -webkit-user-drag:none;
    animation:capbob 1.1s ease-in-out infinite; transform-origin:center bottom; }
  .mouth-anchor{ position:absolute; left:50%; top:54%; width:12px; height:12px;
    transform:translate(-50%,-50%); pointer-events:none; }
  .capy .leg{ transform-box:fill-box; transform-origin:center top; }
  .capy .leg1{ animation:legA .45s ease-in-out infinite; }
  .capy .leg2{ animation:legB .45s ease-in-out infinite; }
  /* moving treadmill belt the capybara walks on */
  .belt{ position:absolute; left:8px; right:8px; bottom:6px; height:26px; z-index:1;
    border-radius:13px; overflow:hidden; background:#3c424b;
    box-shadow:inset 0 3px 0 rgba(255,255,255,.10), inset 0 -5px 0 rgba(0,0,0,.30); }
  .belt::before{ content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(90deg,#565d68 0 14px,#454c56 14px 22px);
    animation:beltmove .45s linear infinite; }   /* slats scroll left = walking forward */
  @keyframes beltmove{ from{ background-position-x:0; } to{ background-position-x:-22px; } }
  /* mouth crossfades open as the cupcake comes near */
  .capy .m-open{ opacity:0; transition:opacity .12s; }
  .capy .m-closed{ opacity:1; transition:opacity .12s; }
  .capy.mouthopen .m-open{ opacity:1; }
  .capy.mouthopen .m-closed{ opacity:0; }
  @keyframes capbob{ 0%,100%{ transform:translateY(0) rotate(0); } 50%{ transform:translateY(-4px) rotate(-1.5deg); } }
  @keyframes legA{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-3px); } }
  @keyframes legB{ 0%,100%{ transform:translateY(-3px); } 50%{ transform:translateY(0); } }
  @keyframes chomp{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.12); } }

  /* ---------- keyword picture in a speech bubble (Letter Sounds) ---------- */
  .lrow{ display:flex; align-items:center; justify-content:center;
    gap:clamp(12px,3vw,32px); flex-wrap:wrap; }
  .bubble{ position:relative; background:linear-gradient(#fffdf6,#fff4d9);
    border:5px solid #ffe1a3; border-radius:44px; padding:14px;
    box-shadow:0 8px 0 #f0d394; }
  .bubble-pic{ width:clamp(94px,20vw,150px); height:clamp(94px,20vw,150px); }
  .bubble-pic svg{ width:100%; height:100%; display:block; }
  /* little tail pointing right, toward the letter choices */
  .bubble::before{ content:""; position:absolute; right:-30px; top:50%;
    transform:translateY(-50%); border:17px solid transparent; border-left-color:#ffe1a3; }
  .bubble::after{ content:""; position:absolute; right:-21px; top:50%;
    transform:translateY(-50%); border:13px solid transparent; border-left-color:#fff7e2; }
  @media (max-width:560px){ .bubble::before, .bubble::after{ display:none; } }

  /* ---------- Trace the Letter ---------- */
  .trace-wrap{ position:relative; width:min(320px,80vw,44vh); touch-action:none;
    -webkit-user-select:none; user-select:none; }
  #tSvg{ display:block; width:100%; height:auto; }
  .trace-guide{ fill:none; stroke:#4f5661; stroke-width:34;
    stroke-linecap:round; stroke-linejoin:round; opacity:.38; transition:opacity .3s; }
  .trace-guide.active{ opacity:1; animation:strokeGlow 1.1s ease-in-out infinite; }
  @keyframes strokeGlow{ 0%,100%{ filter:drop-shadow(0 0 2px rgba(255,205,70,.65)); }
    50%{ filter:drop-shadow(0 0 10px rgba(255,205,70,1)); } }
  #tFood > g{ transition:opacity .3s; }
  #tFood > g.dim{ opacity:.22; }
  #tArrows > path{ transition:opacity .25s; }
  #tArrows > path.dim{ opacity:0; }
  .food-dot{ transition:transform .2s ease, opacity .2s ease;
    transform-box:fill-box; transform-origin:center; }
  .food-dot.eaten{ transform:scale(0); opacity:0; }
  .capy-head{ position:absolute; left:50%; top:50%; width:72px; height:68px;
    margin-left:-36px; margin-top:-34px; z-index:5; pointer-events:none;
    will-change:left,top; filter:drop-shadow(0 3px 2px rgba(0,0,0,.25)); }
  .capy-head svg{ width:100%; height:100%; display:block; }
  .capy-head img{ width:100%; height:100%; object-fit:contain; display:block; -webkit-user-drag:none; }
  .capy-head.eat{ animation:headchomp .25s; }
  @keyframes headchomp{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.22); } }
  /* the mouth opens while the capybara is eating a cupcake */
  .capy-head .hd-mouth-open{ opacity:0; }
  .capy-head.eat .hd-mouth-open{ opacity:1; }
  .capy-head.eat .hd-mouth-closed{ opacity:0; }
  .trace-row{ display:flex; align-items:center; justify-content:center;
    gap:clamp(10px,3vw,30px); flex-wrap:wrap; }
  .trace-bubble .bubble-pic{ width:clamp(84px,18vw,132px); height:clamp(84px,18vw,132px); }
  .trace-bubble.speaking{ animation:bubblepulse .7s ease-in-out infinite; }   /* glows while audio plays */
  @keyframes bubblepulse{ 0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); box-shadow:0 8px 0 #f0d394, 0 0 0 7px rgba(255,205,70,.55); } }
  .trace-controls{ display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .next-btn{ cursor:pointer; border:none; font-family:inherit; font-weight:900; color:#fff;
    background:linear-gradient(#6cc6ff,#3f9fe0); box-shadow:0 7px 0 #2f78ad;
    border-radius:20px; padding:16px 42px; font-size:clamp(20px,3.6vw,28px); }
  .next-btn:active{ transform:translateY(4px); box-shadow:0 3px 0 #2f78ad; }

  /* ---------- Letter Race ---------- */
  .trace-wrap.race{ width:min(300px,78vw,38vh); }
  .race-road{ fill:none; stroke:#3b414b; stroke-width:40; stroke-linecap:round; stroke-linejoin:round; }
  .race-dash{ fill:none; stroke:#ffd24d; stroke-width:3.5; stroke-linecap:round; stroke-dasharray:2 16; }
  .race-start{ fill:#3ec96b; }
  .race-finish{ font-size:26px; text-anchor:middle; dominant-baseline:central; }
  .capy-head.car{ width:56px; height:34px; margin-left:-28px; margin-top:-17px; }
  .lanes{ width:min(440px,92vw); display:flex; flex-direction:column; gap:6px; margin-bottom:6px; }
  .lane{ display:flex; align-items:center; gap:8px; }
  .lane-name{ width:46px; text-align:right; font-weight:900; font-size:13px; }
  .lane-track{ position:relative; flex:1; height:26px; background:#e9eff5; border-radius:13px;
    overflow:hidden; box-shadow:inset 0 2px 0 rgba(0,0,0,.06); }
  .lane-track::after{ content:""; position:absolute; right:6px; top:3px; bottom:3px;
    width:0; border-left:3px dashed #b9c6d2; }
  .lane-car{ position:absolute; top:50%; left:0; transform:translateY(-50%);
    width:40px; height:24px; transition:left .12s linear; }
  .lane-car svg{ width:100%; height:100%; display:block; }
  .lane-flag{ font-size:18px; }
  /* traffic-light START countdown */
  .countdown{ position:absolute; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px; pointer-events:none; }
  .traffic{ background:#2b2f36; padding:14px 12px; border-radius:22px; display:flex;
    flex-direction:column; gap:12px; box-shadow:0 10px 0 rgba(0,0,0,.28); }
  .tl{ width:clamp(44px,12vw,60px); height:clamp(44px,12vw,60px); border-radius:50%;
    background:#3a3f47; box-shadow:inset 0 0 0 3px rgba(0,0,0,.35); opacity:.3; transition:opacity .1s; }
  .tl.red.on{ opacity:1; background:radial-gradient(circle at 40% 35%, #ff9a9a, #e63946); box-shadow:0 0 22px #ff5d5d; }
  .tl.orange.on{ opacity:1; background:radial-gradient(circle at 40% 35%, #ffd88a, #ff9f1c); box-shadow:0 0 22px #ffb13f; }
  .tl.green.on{ opacity:1; background:radial-gradient(circle at 40% 35%, #a7ec86, #2fbf60); box-shadow:0 0 26px #3ec96b; }
  .go-text{ font-size:clamp(52px,14vw,130px); font-weight:900; color:#2fbf60;
    text-shadow:0 6px 0 #1c8442, 0 12px 22px rgba(0,0,0,.3);
    animation:popin .4s cubic-bezier(.34,1.56,.64,1); }

  /* ---------- celebration ---------- */
  .star{ position:fixed; font-size:26px; pointer-events:none; z-index:40; }
  @keyframes rise{ to{ transform:translateY(-120px) rotate(40deg); opacity:0; } }
  /* whack-the-word style mallet */
  .hammer{ position:fixed; width:86px; z-index:75; pointer-events:none;
    filter:drop-shadow(0 4px 3px rgba(0,0,0,.25)); }
  .hammer img{ width:100%; height:auto; display:block; -webkit-user-drag:none; }
  .hammer.swing img{ animation:whackSwing .46s ease-out; transform-origin:72% 84%; }
  @keyframes whackSwing{ 0%{ transform:rotate(-46deg); } 50%{ transform:rotate(10deg); }
    72%{ transform:rotate(0deg); } 100%{ transform:rotate(-46deg); } }
  /* Sight Words: reward is the fountain game now, so no cupcake to feed here */
  #wTrack .cake{ display:none; }

  /* ---------- Fountain reward game ---------- */
  #fountain{ justify-content:flex-start; }
  .fnt-stage{ position:relative; flex:1; width:100%; overflow:hidden;
    background:linear-gradient(#bfe6ff 0%, #d9f2ff 55%, #eafaff 100%); }
  .fnt-ground{ position:absolute; left:0; right:0; bottom:0; height:9%;
    background:linear-gradient(#8ad06a 0 40%, #6bb84e 100%); }
  .fnt-base{ position:absolute; left:50%; bottom:5%; width:clamp(120px,34vw,190px);
    transform:translateX(-50%); z-index:2; }
  .fnt-base svg{ width:100%; height:auto; display:block; }
  .fnt-water{ position:absolute; left:50%; bottom:12%; width:clamp(20px,5vw,30px);
    transform:translateX(-50%); z-index:1; border-radius:12px 12px 0 0;
    background:linear-gradient(#eafaff, #9fdcff 40%, #6bc6f5);
    box-shadow:0 0 10px rgba(120,200,255,.6); height:6%;
    animation:waterwob .5s ease-in-out infinite alternate; }
  @keyframes waterwob{ from{ width:clamp(18px,4.6vw,28px);} to{ width:clamp(22px,5.4vw,32px);} }
  .fnt-float{ position:absolute; left:50%; bottom:22%; transform:translateX(-50%);
    width:clamp(120px,32vw,180px); z-index:3; }
  .fnt-ring{ width:100%; }
  .fnt-ring svg{ width:100%; height:auto; display:block; }
  .fnt-squirrel{ position:absolute; left:50%; bottom:34%; transform:translateX(-50%);
    width:clamp(64px,17vw,96px); z-index:4; -webkit-user-drag:none;
    animation:sqbob .9s ease-in-out infinite; }
  @keyframes sqbob{ 0%,100%{ transform:translateX(-50%) translateY(0) rotate(-1.5deg);}
    50%{ transform:translateX(-50%) translateY(-4px) rotate(1.5deg);} }
  .fnt-squirrel.hop{ animation:sqhop .6s ease-out; }
  @keyframes sqhop{ 0%{ transform:translateX(-50%) translateY(0);}
    45%{ transform:translateX(-50%) translateY(-40px) scale(1.05);} 100%{ transform:translateX(-50%) translateY(-14px);} }
  .balloon{ position:absolute; left:50%; bottom:60%; transform:translateX(-50%);
    width:clamp(96px,26vw,150px); z-index:3; animation:balfloat 2.6s ease-in-out infinite; }
  .balloon svg{ width:100%; height:auto; display:block; }
  @keyframes balfloat{ 0%,100%{ transform:translateX(-50%) translateY(0);} 50%{ transform:translateX(-50%) translateY(-10px);} }
  .balloon.liftoff, .fnt-float.liftoff{ transition:transform 1.9s ease-in, opacity 1.9s ease-in;
    transform:translateX(-50%) translateY(-190%); opacity:0; }
  .jump-btn{ position:absolute; left:50%; bottom:44%; transform:translateX(-50%);
    z-index:6; cursor:pointer; border:none; font-family:inherit; font-weight:900; color:#fff;
    background:linear-gradient(#ffce4d,#f0a91f); box-shadow:0 6px 0 #c47f0c;
    border-radius:16px; padding:14px 28px; font-size:clamp(20px,4vw,30px);
    animation:jumppulse .6s ease-in-out infinite; }
  .jump-btn:active{ transform:translateX(-50%) translateY(4px); box-shadow:0 2px 0 #c47f0c; }
  @keyframes jumppulse{ 0%,100%{ transform:translateX(-50%) scale(1);} 50%{ transform:translateX(-50%) scale(1.08);} }
  .fnt-prompt{ font-weight:900; color:#2f6f9e; text-align:center; padding:10px 14px;
    font-size:clamp(16px,3vw,24px); text-shadow:0 2px 0 rgba(255,255,255,.6); }

   ============================================================ */
const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const shuffle = a => { for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; };

let muted = false;

/* ---------- recorded audio (one element, played in sequence) ---------- */
let audioStop = null;             // cancels any running audio chain
function stopAudio(){ if(audioStop){ audioStop(); audioStop=null; } speechSynthesis.cancel(); }

// play a list of steps in order. A step is {audio:"path"} or {say:"text"}.
function playSequence(steps, done){
  stopAudio();
  if(muted){ if(done) done(); return; }
  let i = 0, cancelled = false, current = null;
  audioStop = ()=>{ cancelled=true; if(current){ current.pause(); current.onended=null; current.onerror=null; } };
  const next = ()=>{
    if(cancelled) return;
    if(i >= steps.length){ audioStop=null; if(done) done(); return; }
    const step = steps[i++];
    if(step.say){
      const u = new SpeechSynthesisUtterance(step.say);
      u.rate = .85; u.pitch = 1.05;
      u.onend = next; u.onerror = next;
      // small safety in case speech never fires
      const t = setTimeout(next, 1500);
      u.onend = ()=>{ clearTimeout(t); next(); };
      speechSynthesis.speak(u);
    } else {
      const a = new Audio(step.audio);
      current = a;
      a.onended = next;
      a.onerror = ()=> setTimeout(next, 200);
      a.play().catch(()=> setTimeout(next, 200));
    }
  };
  next();
}

/* ---------- simple TTS (sight words) ---------- */
function say(text, done){
  stopAudio();
  if(muted || !('speechSynthesis' in window)){ if(done) setTimeout(done,400); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.rate = .8; u.pitch = 1.05;
  u.onend = done; u.onerror = done;
  speechSynthesis.speak(u);
}

// the reward pet: a cute capybara the child feeds by sliding the cupcake to its
// mouth. It opens up as the cupcake nears, chomps, and grows bigger each time.
class Capybara{
  constructor(trackEl){
    this.track = trackEl;
    this.scale = 1;       // overall size — grows as it eats
    this.fed = 0;         // cupcakes eaten
    this.active = false; this.dragging = false; this.eaten = false;
    this.pendingDone = null;
    this.build();
  }
  build(){
    this.track.innerHTML = '';
    this.capy = document.createElement('div');
    this.capy.className = 'capy';
    this.capy.innerHTML = `<div class="capy-inner">${capybaraSVG()}</div>`;
    this.cake = document.createElement('div');
    this.cake.className = 'cake';
    this.cake.innerHTML = randomTreat();
    const belt = document.createElement('div');   // moving treadmill belt
    belt.className = 'belt';
    this.track.appendChild(belt);
    this.track.appendChild(this.capy);
    this.track.appendChild(this.cake);
    this.applyScale();
    this.reset();
    // slide-to-feed (pointer events cover both touch and mouse)
    this.cake.addEventListener('pointerdown', e=> this.onDown(e));
    window.addEventListener('pointermove',   e=> this.onMove(e));
    window.addEventListener('pointerup',     e=> this.onUp(e));
    window.addEventListener('pointercancel', e=> this.onUp(e));
  }
  applyScale(){ this.capy.style.transform = `scale(${this.scale})`; }
  // fresh cupcake resting on the right, nothing draggable yet
  reset(){
    this.active = false; this.dragging = false; this.eaten = false;
    this.capy.classList.remove('mouthopen','eat');
    this.cake.classList.remove('eaten','active','dragging');
    this.cake.innerHTML = randomTreat();           // a fresh, randomly-coloured treat
    this.cake.style.transition = 'transform .25s';
    const w = this.track.clientWidth || 360;
    // rest the cupcake a short hop to the right of the squirrel's mouth (short path)
    let base = 170;
    const tr = this.track.getBoundingClientRect();
    const m = this.capy.querySelector('.mouth-anchor');
    if(m && tr.width){ const mr = m.getBoundingClientRect(); if(mr.width) base = (mr.left - tr.left) + 100; }
    this.homeX = Math.min(w - 70, Math.max(150, base));
    this.cake.style.left = this.homeX + 'px';
    this.cake.style.bottom = '30px';
  }
  // called on a correct answer — let the child slide the cupcake to the mouth
  feed(done){
    this.pendingDone = done; this.eaten = false; this.active = true;
    this.cake.classList.add('active');
  }
  mouthRect(){ return this.capy.querySelector('.mouth-anchor').getBoundingClientRect(); }
  cakeDistance(){
    const h = this.mouthRect(), c = this.cake.getBoundingClientRect();
    return Math.hypot((c.left+c.width/2)-(h.left+h.width/2),
                      (c.top +c.height/2)-(h.top +h.height/2));
  }
  onDown(e){
    if(!this.active || this.eaten) return;
    this.dragging = true;
    this.cake.classList.add('dragging');
    this.cake.classList.remove('active');
    this.cake.style.transition = 'none';
    try{ this.cake.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault();
  }
  onMove(e){
    if(!this.dragging) return;
    const tr = this.track.getBoundingClientRect();
    const x = Math.max(20, Math.min(tr.width-20, e.clientX - tr.left));
    const y = e.clientY - tr.top;
    let bottom = tr.height - y - this.cake.offsetHeight/2;
    bottom = Math.max(8, Math.min(tr.height-44, bottom));
    this.cake.style.left = (x - this.cake.offsetWidth/2) + 'px';
    this.cake.style.bottom = bottom + 'px';
    const d = this.cakeDistance();
    this.capy.classList.toggle('mouthopen', d < 95);   // open up near the cupcake
    if(d < 50) this.eat();
  }
  onUp(e){
    if(!this.dragging) return;
    this.dragging = false;
    this.cake.classList.remove('dragging');
    try{ this.cake.releasePointerCapture(e.pointerId); }catch(_){}
    if(this.eaten || !this.active) return;
    this.glideToMouth();          // forgiving: finish the trip for her
  }
  // glide the cupcake the rest of the way into the open mouth, then eat
  glideToMouth(){
    const h = this.mouthRect(), tr = this.track.getBoundingClientRect();
    const left   = (h.left - tr.left) + h.width/2 - this.cake.offsetWidth/2 + 4;
    const bottom = tr.height - ((h.top - tr.top) + h.height/2) - this.cake.offsetHeight/2;
    this.capy.classList.add('mouthopen');
    this.cake.style.transition = 'left .5s ease-in, bottom .5s ease-in';
    this.cake.style.left = left + 'px';
    this.cake.style.bottom = Math.max(8, bottom) + 'px';
    const t = setTimeout(()=>{ if(!this.eaten) this.eat(); }, 540);
    this.cake.addEventListener('transitionend',
      ()=>{ clearTimeout(t); if(!this.eaten) this.eat(); }, {once:true});
  }
  // chomp, grow bigger, then load the next round
  eat(){
    if(this.eaten) return;
    this.eaten = true; this.active = false; this.dragging = false;
    this.capy.classList.add('eat','mouthopen');
    this.cake.classList.add('eaten');
    setTimeout(()=> this.capy.classList.remove('mouthopen'), 250);
    setTimeout(()=>{
      this.capy.classList.remove('eat');
      this.fed++;
      this.scale = Math.min(1.45, 1 + this.fed*0.08);      // the squirrel grows as it eats
      this.applyScale();
      // make the growth obvious + exciting: a happy bounce + a sparkle burst
      this.capy.classList.add('grow');
      setTimeout(()=> this.capy.classList.remove('grow'), 700);
      const r = this.capy.getBoundingClientRect();
      stars(r.left + r.width/2, r.top + r.height/2);
      const done = this.pendingDone; this.pendingDone = null;
      setTimeout(()=>{ this.reset(); if(done) done(); }, 700);
    }, 420);
  }
}

/* ============================================================
   GAME 1 — LETTER SOUNDS
   Hear:  /sound/  ·  keyword  ·  "Find" /sound/
   Then tap the matching letter (2 choices).
   ============================================================ */
const L = { target:null, locked:false, bag:[], cat:null };

function startLetters(){
  show('letters');
  if(!L.cat) L.cat = new Capybara($('#lTrack'));
  L.cat.reset();
  L.bag = [];
  letterRound();
}

function nextLetter(){
  if(L.bag.length===0) L.bag = shuffle([...SOUND_KEYS]);
  return L.bag.pop();
}

function letterRound(){
  L.locked = true;               // frozen until the prompt finishes
  L.target = nextLetter();
  const distractor = shuffle(SOUND_KEYS.filter(k=>k!==L.target))[0];
  const choices = shuffle([L.target, distractor]);

  $('#lPic').innerHTML = KEYWORD_ART[SOUNDLETTERS[L.target]] || '';   // keyword picture

  const cards = $('#lCards');
  cards.innerHTML = '';
  choices.forEach(letter=>{
    const c = document.createElement('div');
    c.className = 'lcard';
    c.textContent = letter;
    if(letter.length > 1) c.style.fontSize = 'clamp(46px,12vw,88px)';   // "qu" fits
    c.addEventListener('click', ()=> pickLetter(letter, c));
    cards.appendChild(c);
  });

  playPrompt();
}

// one recording per letter: sound -> keyword -> "find sound".
// The letters stay frozen until the whole prompt has finished playing.
function playPrompt(){
  L.locked = true;                              // no tapping while it plays
  $('#lCards').classList.add('listening');      // dim + disable the letters
  $('#lPrompt').textContent = '👂 Listen carefully…';
  playSequence([
    { audio:`audio/soundletter/${L.target}.m4a` },
  ], ()=>{                                       // prompt done — now the child may choose
    L.locked = false;
    $('#lCards').classList.remove('listening');
    $('#lPrompt').textContent = '👉 Tap the letter you heard';
  });
}
$('#lListen').addEventListener('click', playPrompt);

function pickLetter(letter, el){
  if(L.locked) return;
  if(letter === L.target){
    L.locked = true;
    el.classList.add('good');
    const r = el.getBoundingClientRect();
    stars(r.left + r.width/2, r.top + r.height/2);
    banner();
    $('#lPrompt').textContent = '🧁 Slide the cupcake to the capybara!';
    L.cat.feed(()=> letterRound());
  } else {
    L.locked = true;                            // freeze again; must listen once more
    el.classList.add('bad');
    $('#lCards').classList.add('listening');
    $('#lPrompt').textContent = 'Try again — listen!';
    setTimeout(()=>{ el.classList.remove('bad'); playPrompt(); }, 700);
  }
}

/* ============================================================
   GAME 2 — SIGHT WORDS  (whack-a-mole matching, calmed down)
   Two signs show the SAME word — tap them both.
   ============================================================ */
const W = { board:[], target:"", selected:[], locked:false, bag:[], cat:null, matches:0 };

function startWords(){
  show('words');
  if(!W.cat) W.cat = new Capybara($('#wTrack'));
  W.cat.reset();
  W.bag = [];
  wordRound();
}

function nextWord(){
  if(W.bag.length===0) W.bag = shuffle([...SIGHT_WORDS]);
  return W.bag.pop();
}

function wordRound(){
  W.locked = false;
  W.selected = [];
  W.target = nextWord();
  const distractors = shuffle(SIGHT_WORDS.filter(w=>w!==W.target)).slice(0,2);
  W.board = shuffle([W.target, W.target, ...distractors]);   // 4 signs: 2 same + 2 others

  const board = $('#wBoard');
  board.innerHTML = '';
  W.board.forEach((w,i)=>{
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.dataset.i = i;
    hole.innerHTML = `<div class="mound"></div>
      <div class="sign"><div class="post"></div>
        <div class="plank"><span class="word">${w}</span></div></div>`;
    hole.addEventListener('click', ()=> pickSign(i));
    board.appendChild(hole);
  });
  $('#wPrompt').textContent = '🔍 Find the two words that are the same!';

  // pop the signs up with a gentle stagger
  shuffle([...board.children]).forEach((h,k)=> setTimeout(()=> h.classList.add('up'), 120 + k*110));
}

function pickSign(i){
  if(W.locked) return;
  const els = [...$('#wBoard').children];
  const el = els[i];
  if(!el.classList.contains('up')) return;

  const r = el.getBoundingClientRect();
  whack(r.left + r.width/2, r.top + r.height*0.45);   // 🔨 hammer hits the sign

  const at = W.selected.indexOf(i);
  if(at>=0){ W.selected.splice(at,1); el.classList.remove('sel'); return; }  // tap again to unselect
  if(W.selected.length>=2) return;
  W.selected.push(i);
  el.classList.add('sel');
  if(W.selected.length===2) checkPair();
}

function checkPair(){
  const [a,b] = W.selected;
  const els = [...$('#wBoard').children];
  if(W.board[a] === W.board[b]){
    W.locked = true;
    const word = W.board[a];
    els[a].classList.add('good'); els[b].classList.add('good');
    const r = els[a].getBoundingClientRect();
    stars(r.left + r.width/2, r.top + r.height/2);
    banner();
    $('#wPrompt').innerHTML = `🔊 <b>“${word}”</b>`;
    playSequence([{ audio:`audio/fry/${word}.m4a` }]);   // your recorded word
    W.matches++;
    // every 2 correct matches, play the fountain reward game; otherwise next round
    if(W.matches % 2 === 0) setTimeout(()=> startFountain(()=>{ show('words'); wordRound(); }), 900);
    else                    setTimeout(()=> wordRound(), 1000);
  } else {
    els[a].classList.add('bad'); els[b].classList.add('bad');
    $('#wPrompt').textContent = 'Not the same — try again!';
    setTimeout(()=>{
      els[a].classList.remove('bad','sel'); els[b].classList.remove('bad','sel');
      W.selected = [];
      $('#wPrompt').textContent = '🔍 Find the two words that are the same!';
    }, 700);
  }
}

const F = { water:0, height:0, base:12, taps:0, raf:0, onDone:null, reached:false, jumping:false, active:false };

function fountainBaseSVG(){

}

function startFountain(onDone){
  F.onDone = onDone; F.water = F.base; F.height = F.base; F.taps = 0;
  F.reached = false; F.jumping = false; F.active = true;
  F.startedAt = performance.now();
  // the eagle shows up on ~2 of every 3 games, at a random moment (surprise!)
  F.eagle = { will: Math.random() < 0.66, on:false, phase:'', spawnAt: 3000 + Math.random()*2600,
              ang:0, circles:0, gx:0, gy:0 };
  $('#fntBalloon').classList.remove('liftoff'); $('#fntFloat').classList.remove('liftoff');
  $('#fntSquirrel').classList.remove('hop'); $('#fntSquirrel').style.visibility = '';
  $('#fntEagle').classList.add('hidden'); $('#fntPrey').classList.add('hidden');
  $('#fntJump').classList.add('hidden');
  $('#fntPrompt').textContent = 'Smash the button to pump the water! 💥';
  show('fountain');
  renderFountain();
  cancelAnimationFrame(F.raf); F.raf = requestAnimationFrame(fountainTick);
}
function fountainTick(){
  if(!F.active) return;
  if(!F.jumping){
    F.water = Math.max(F.base, F.water - 0.42);          // weak fountain — water drains back
    F.height += (F.water - F.height) * 0.11;             // float eases toward the water level
    if(!F.reached && F.height >= 88){ F.reached = true; onReachBalloon(); }
  }
  renderFountain();
  updateEagle();
  F.raf = requestAnimationFrame(fountainTick);
}
function renderFountain(){
  const GROUND = 18, TOP = 58;
  const h = Math.max(0, Math.min(102, F.height));
  const bottomPct = GROUND + (h/100)*(TOP-GROUND);
  $('#fntFloat').style.bottom = bottomPct + '%';
  $('#fntWater').style.height = Math.max(4, bottomPct - 12) + '%';
}
function smashFountain(){
  if(!F.active || F.jumping) return;
  F.taps++;
  F.water = Math.min(112, F.water + 9);
  if(F.taps % 10 === 0) F.water = Math.min(122, F.water + 18);   // every 10 hits = a big bounce
  const b = $('#fntSmash'), r = b.getBoundingClientRect();
  whack(r.left + r.width/2, r.top + 6);
  b.classList.remove('press'); void b.offsetWidth; b.classList.add('press');
}
function onReachBalloon(){
  $('#fntJump').classList.remove('hidden');
  $('#fntPrompt').textContent = 'You reached the balloon! Press JUMP! 🎈';
}
function jumpToBalloon(){
  if(!F.active || F.jumping) return;
  F.jumping = true; F.water = 122;                       // float rises the last bit
  $('#fntJump').classList.add('hidden');
  $('#fntPrompt').textContent = '🎉 Wheee! Off in the balloon!';
  $('#fntSquirrel').classList.add('hop');
  banner();
  setTimeout(()=>{ $('#fntBalloon').classList.add('liftoff'); $('#fntFloat').classList.add('liftoff'); }, 750);
  setTimeout(endFountain, 2600);
}
function endFountain(){
  F.active = false; cancelAnimationFrame(F.raf);
  const done = F.onDone; F.onDone = null;
  if(done) done();
}

// a big flying eagle (side view, facing right)
function eagleSVG(){
  return `<svg viewBox="0 0 180 130" xmlns="http://www.w3.org/2000/svg">
    <path d="M80 60 C60 18 30 4 6 12 C30 26 50 46 72 62 Z" fill="#5a3f24"/>
    <path d="M58 62 L22 68 L58 76 Z" fill="#5a3f24"/>
    <path d="M60 58 Q102 44 142 58 Q152 61 150 68 Q118 80 78 76 Q62 72 60 58Z" fill="#7a5533"/>
    <path d="M84 66 C72 104 42 122 14 116 C42 102 62 82 82 68 Z" fill="#6b4a2b"/>
    <path d="M96 76 l-3 14 M104 76 l0 15 M112 74 l4 13" stroke="#ffb13f" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="140" cy="56" r="14" fill="#f4f1ea"/>
    <path d="M152 51 L173 58 L152 65 Z" fill="#ffb13f"/>
    <path d="M152 60 L167 62 L152 66 Z" fill="#e8992a"/>
    <circle cx="145" cy="53" r="3" fill="#2b2b2b"/><circle cx="146.4" cy="52" r="1" fill="#fff"/>
  </svg>`;
}
function placeEagle(x, y, flip){
  const el = $('#fntEagle');
  const w = el.offsetWidth || 150, h = el.offsetHeight || 110;
  el.style.left = (x - w/2) + 'px';
  el.style.top  = (y - h/2) + 'px';
  el.style.transform = flip ? 'scaleX(-1)' : 'scaleX(1)';
}
// circle the squirrel 3 times, then swoop and carry it off — unless it has
// already jumped into the balloon (then the eagle gives up and flies away).
function updateEagle(){
  const eg = F.eagle; if(!eg || !F.active) return;
  const el = $('#fntEagle');
  if(eg.will && !eg.on && !F.jumping && (performance.now() - F.startedAt) >= eg.spawnAt){
    eg.on = true; eg.phase = 'circle'; eg.ang = -Math.PI/2; eg.circles = 0;
    el.classList.remove('hidden');
    $('#fntPrompt').textContent = '🦅 An eagle! Pump FAST to the balloon!';
    if(!muted) beep(300, 0.3, 'sawtooth', 0.14);
  }
  if(!eg.on) return;
  if(F.jumping && eg.phase !== 'flee' && eg.phase !== 'carry') eg.phase = 'flee';   // escaped!
  const st = $('#fntStage').getBoundingClientRect();
  const sr = $('#fntSquirrel').getBoundingClientRect();
  const cx = sr.left + sr.width/2 - st.left, cy = sr.top + sr.height/2 - st.top;
  const R = Math.min(st.width*0.34, 180);
  if(eg.phase === 'circle'){
    eg.ang += 0.09;
    if(eg.ang >= -Math.PI/2 + (eg.circles+1)*2*Math.PI) eg.circles++;
    if(eg.circles >= 3) eg.phase = 'swoop';
    eg.gx = cx + R*Math.cos(eg.ang); eg.gy = cy + R*Math.sin(eg.ang)*0.72;
    placeEagle(eg.gx, eg.gy, Math.sin(eg.ang) > 0);
  } else if(eg.phase === 'swoop'){
    const dx = cx - eg.gx, dy = cy - eg.gy;
    if(Math.hypot(dx,dy) < 30){ grabByEagle(); return; }
    eg.gx += dx*0.16; eg.gy += dy*0.16;
    placeEagle(eg.gx, eg.gy, dx < 0);
  } else if(eg.phase === 'flee'){
    eg.gy -= 9; eg.gx += 5; placeEagle(eg.gx, eg.gy, false);
    if(eg.gy < -160){ el.classList.add('hidden'); eg.on = false; }
  } else if(eg.phase === 'carry'){
    eg.gx += 6; eg.gy -= 8; placeEagle(eg.gx, eg.gy, false);
    if(eg.gy < -190){ eg.on = false; el.classList.add('hidden'); endFountain(); }
  }
}
function grabByEagle(){
  const eg = F.eagle; eg.phase = 'carry'; F.jumping = true;   // physics stops; squirrel taken
  $('#fntJump').classList.add('hidden');
  $('#fntPrompt').textContent = '😮 Whoosh! The eagle carried the squirrel off!';
  $('#fntSquirrel').style.visibility = 'hidden';
  $('#fntPrey').classList.remove('hidden');
  if(!muted) beep(200, 0.35, 'sawtooth', 0.16);
}

/* populate + wire the fountain */
$('#fntBalloon').innerHTML = balloonSVG();
$('#fntRing').innerHTML = floatSVG();
$('#fntBase').innerHTML = fountainBaseSVG();
$('#fntEagleBody').innerHTML = eagleSVG();
$('#fntSmash').addEventListener('pointerdown', e=>{ e.preventDefault(); smashFountain(); });
$('#fntJump').addEventListener('click', jumpToBalloon);

/* ============================================================
   GAME 3 — TRACE THE LETTER
   Drag the capybara head along the letter to eat the food dots.
   A verbal prompt (sound · keyword · sound, e.g. /c/ cake /c/)
   plays before the child traces and again when it's done.
   ============================================================ */
const NS = 'http://www.w3.org/2000/svg';
const T = { target:null, bag:[], food:[], total:0, next:0, eaten:0, locked:false, dragging:false, done:false,
            strokeEls:[], activeStroke:0, flexible:false };
// letters that may be traced either direction (any-order, no arrows)
const FLEXIBLE = new Set(['o']);

function nextTraceLetter(){ if(T.bag.length===0) T.bag = shuffle([...LETTER_KEYS]); return T.bag.pop(); }
function startTrace(){ show('trace'); T.bag = []; traceRound(); }

// split a path's "d" into its separate strokes (each starts with M)
function subPaths(d){ return (d.match(/M[^M]*/g) || []); }
// sample evenly-spaced points along one stroke (SVG-space)
function samplePoints(subD, spacing){
  const tp = document.createElementNS(NS,'path'); tp.setAttribute('d', subD);
  tp.setAttribute('visibility','hidden'); $('#tSvg').appendChild(tp);
  const len = tp.getTotalLength();
  const n = len < 26 ? 1 : Math.max(3, Math.round(len/spacing));
  const pts = [];
  for(let i=0;i<n;i++){ const p = tp.getPointAtLength(len*(i+0.5)/n); pts.push({x:p.x, y:p.y}); }
  $('#tSvg').removeChild(tp);
  return pts;
}

function traceRound(){
  T.done = false; T.locked = true; T.dragging = false; T.next = 0;
  $('#tNext').classList.add('hidden');
  T.target = nextTraceLetter();
  T.flexible = FLEXIBLE.has(T.target);    // 'o' can go either way
  const subs = subPaths(TRACE_PATHS[T.target] || TRACE_PATHS.o);
  buildStrokes(subs);
  if(T.flexible) $('#tArrows').innerHTML = ''; else buildArrows(subs);
  buildFood(subs);
  setActiveStroke(0);                     // highlight the first stroke to trace
  $('#tPic').innerHTML = KEYWORD_ART[LETTERS[T.target].kw] || '';
  requestAnimationFrame(placeHeadAtStart);
  playTraceIntro();
}

// draw each stroke as its own path so it can be highlighted one at a time
function buildStrokes(subs){
  const g = $('#tStrokes'); g.innerHTML = ''; T.strokeEls = [];
  subs.forEach(sd=>{
    const p = document.createElementNS(NS,'path');
    p.setAttribute('d', sd); p.setAttribute('class','trace-guide');
    g.appendChild(p); T.strokeEls.push(p);
  });
}

// cupcakes along EVERY stroke, in order; each remembers which stroke it's on
function buildFood(subs){
  const foodG = $('#tFood'); foodG.innerHTML = ''; T.food = [];
  subs.forEach((sd, k)=>{
    samplePoints(sd, 40).forEach(p=>{
      const pos = document.createElementNS(NS,'g');
      pos.setAttribute('transform', `translate(${p.x.toFixed(1)} ${p.y.toFixed(1)})`);
      const cup = makeCupcake(); pos.appendChild(cup); foodG.appendChild(pos);
      T.food.push({ el:cup, pos, eaten:false, stroke:k });
    });
  });
  T.total = T.food.length; T.next = 0; T.eaten = 0;
}

// small arrows inside each stroke showing the tracing direction
function buildArrows(subs){
  const g = $('#tArrows'); g.innerHTML = '';
  subs.forEach((sd, k)=>{
    const tp = document.createElementNS(NS,'path'); tp.setAttribute('d', sd);
    tp.setAttribute('visibility','hidden'); $('#tSvg').appendChild(tp);
    const len = tp.getTotalLength();
    const fracs = len < 20 ? [] : len < 60 ? [0.5] : [0.16, 0.5, 0.84];
    fracs.forEach(fr=>{
      const l = len*fr, p = tp.getPointAtLength(l), p2 = tp.getPointAtLength(Math.min(len, l+3));
      const ang = Math.atan2(p2.y-p.y, p2.x-p.x)*180/Math.PI;
      const a = document.createElementNS(NS,'path');
      a.setAttribute('d','M-4 -6 L7 0 L-4 6 Z'); a.setAttribute('fill','#fff6d8'); a.setAttribute('opacity','.9');
      a.dataset.k = k;
      a.setAttribute('transform', `translate(${p.x.toFixed(1)} ${p.y.toFixed(1)}) rotate(${ang.toFixed(0)})`);
      g.appendChild(a);
    });
    $('#tSvg').removeChild(tp);
  });
}

// highlight one stroke; dim the other strokes, their cupcakes and their arrows
function setActiveStroke(k){
  T.activeStroke = k;
  T.strokeEls.forEach((el,i)=> el.classList.toggle('active', i===k));
  T.food.forEach(f=> f.pos.classList.toggle('dim', f.stroke!==k));
  $('#tArrows').querySelectorAll('path').forEach(a=> a.classList.toggle('dim', +a.dataset.k!==k));
}

function placeHeadAtStart(){
  const svg = $('#tSvg'); const w = svg.getBoundingClientRect().width;
  if(!w || !T.strokeEls[0]) return;
  const scale = w/220; const p = T.strokeEls[0].getPointAtLength(0);
  const head = $('#tHead'); head.style.left = (p.x*scale)+'px'; head.style.top = (p.y*scale)+'px';
}

function eatCupcake(f){
  f.eaten = true; f.el.classList.add('eaten'); T.eaten++;
  const head = $('#tHead'); head.classList.add('eat'); setTimeout(()=> head.classList.remove('eat'), 260);
  if(T.eaten >= T.total) completeTrace();
}
function near(e, el){
  const fr = el.getBoundingClientRect();
  return fr.width && Math.hypot(e.clientX-(fr.left+fr.width/2), e.clientY-(fr.top+fr.height/2)) < 34;
}
// Flexible letters ('o'): eat any nearby cupcake (trace either way). Others:
// only the NEXT cupcake in order, and the highlight moves stroke by stroke.
function moveHead(e){
  const r = $('#tWrap').getBoundingClientRect(); const head = $('#tHead');
  head.style.left = (e.clientX - r.left) + 'px';
  head.style.top  = (e.clientY - r.top)  + 'px';
  if(T.flexible){
    for(const f of T.food){ if(!f.eaten && near(e, f.el)) eatCupcake(f); }
  } else if(T.next < T.food.length){
    const f = T.food[T.next];
    if(near(e, f.el)){
      eatCupcake(f); T.next++;
      if(!T.done && T.next < T.food.length && T.food[T.next].stroke !== T.activeStroke) setActiveStroke(T.food[T.next].stroke);
    }
  }
}

function completeTrace(){
  T.done = true; T.locked = true; T.dragging = false;
  banner();
  const r = $('#tWrap').getBoundingClientRect(); stars(r.left + r.width/2, r.top + r.height/2);
  $('#tPrompt').innerHTML = `🎉 You traced <b>“${T.target}”</b>!`;
  $('#tNext').classList.remove('hidden');    // no audio replay — wait for NEXT
}

// "Repeat after me" + sound · keyword · sound. Tracing stays frozen until it ends.
function playTraceIntro(){
  T.locked = true;
  $('#tBubbleWrap').classList.add('speaking');
  $('#tPrompt').textContent = '🔁 Repeat after me…';
  playLetterTriad(T.target, ()=>{
    $('#tBubbleWrap').classList.remove('speaking');
    if(T.done) return;                       // was a replay after finishing
    T.locked = false;
    $('#tPrompt').textContent = '✏️ Trace the letter!';
  });
}

// one recording per letter: sound · keyword · sound  (e.g. /c/ cat /c/)
function playLetterTriad(letter, done){
  playSequence([ { audio:`audio/trace/${letter}.m4a` } ], done);
}

/* drag the capybara head (pointer = touch + mouse) */
$('#tHead').innerHTML = capyHeadSVG();
(function(){
  const wrap = $('#tWrap');
  wrap.addEventListener('pointerdown', e=>{
    if(T.locked) return;
    T.dragging = true; try{ wrap.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault(); moveHead(e);
  });
  wrap.addEventListener('pointermove', e=>{
    if(T.locked || !T.dragging) return;
    e.preventDefault(); moveHead(e);
  });
  window.addEventListener('pointerup',     ()=>{ T.dragging = false; });
  window.addEventListener('pointercancel', ()=>{ T.dragging = false; });
})();
$('#tListen').addEventListener('click', playTraceIntro);
$('#tNext').addEventListener('click', traceRound);

/* ============================================================
   GAME 4 — LETTER RACE
   Same tracing, but the letter is a race track and the icon is a
   car. Trace to the finish before the (computer) opponents. The
   child's completion time is recorded (best time kept).
   ============================================================ */
const RACERS = [
  { name:'You',  color:'#e63946', you:true },
  { name:'Bolt', color:'#3f9fe0' },
  { name:'Zoom', color:'#39c06b' },
  { name:'Ace',  color:'#c079e6' },
];
const R = { target:null, bag:[], dots:[], total:0, next:0, locked:false, dragging:false,
            racing:false, finished:false, startTime:0, raf:0, opps:[] };

function carSVG(color){
  return `<svg viewBox="0 0 90 54" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="45" cy="49" rx="36" ry="4" fill="rgba(0,0,0,.18)"/>
    <path d="M8 40 L20 40 L30 27 L52 25 L64 33 L82 36 Q88 37 88 42 L88 44 L8 44 Z" fill="${color}"/>
    <path d="M32 29 L50 27 L60 33 L34 34 Z" fill="#cdeeff" opacity=".9"/>
    <rect x="10" y="39" width="76" height="4" rx="2" fill="rgba(255,255,255,.3)"/>
    <circle cx="27" cy="45" r="8" fill="#242830"/><circle cx="27" cy="45" r="3.4" fill="#c9ced6"/>
    <circle cx="66" cy="45" r="8" fill="#242830"/><circle cx="66" cy="45" r="3.4" fill="#c9ced6"/>
  </svg>`;
}

/* race start sounds (synthesised, so no extra audio files needed) */
let ACX;
function actx(){ try{ ACX = ACX || new (window.AudioContext||window.webkitAudioContext)();
  if(ACX.state==='suspended') ACX.resume(); }catch(_){} return ACX; }
function beep(freq, dur, type='square', vol=0.2){
  if(muted) return; const ctx = actx(); if(!ctx) return;
  try{ const o=ctx.createOscillator(), g=ctx.createGain(); o.type=type; o.frequency.value=freq;
    o.connect(g); g.connect(ctx.destination); const t=ctx.currentTime;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(_){}
}
function startGun(){
  if(muted) return; const ctx = actx(); if(!ctx) return;
  try{ const n=Math.floor(ctx.sampleRate*0.2); const buf=ctx.createBuffer(1,n,ctx.sampleRate); const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2.5);
    const s=ctx.createBufferSource(); s.buffer=buf; const g=ctx.createGain(); g.gain.value=0.55;
    s.connect(g); g.connect(ctx.destination); s.start();
  }catch(_){}
}
// RED · ORANGE · GREEN traffic-light countdown with beeps, then GO! + start gun
function runCountdown(onGo){
  const cd=$('#rCountdown'), red=$('#tlRed'), org=$('#tlOrange'), grn=$('#tlGreen'), go=$('#rGo');
  [red,org,grn].forEach(l=> l.classList.remove('on')); go.classList.add('hidden');
  cd.classList.remove('hidden');
  setTimeout(()=>{ red.classList.add('on'); beep(520,0.18); }, 350);
  setTimeout(()=>{ red.classList.remove('on'); org.classList.add('on'); beep(520,0.18); }, 1250);
  setTimeout(()=>{ org.classList.remove('on'); grn.classList.add('on'); go.classList.remove('hidden');
    startGun(); beep(1000,0.3,'square',0.25); onGo(); }, 2150);
  setTimeout(()=>{ cd.classList.add('hidden'); }, 3200);
}

// sample points along a stroke, using a given SVG as the measuring surface
function sampleAlong(svgSel, subD, spacing){
  const svg = $(svgSel); const tp = document.createElementNS(NS,'path');
  tp.setAttribute('d', subD); tp.setAttribute('visibility','hidden'); svg.appendChild(tp);
  const len = tp.getTotalLength();
  const n = len < 26 ? 1 : Math.max(3, Math.round(len/spacing));
  const pts = [];
  for(let i=0;i<n;i++){ const p = tp.getPointAtLength(len*(i+0.5)/n); pts.push({x:p.x, y:p.y}); }
  svg.removeChild(tp); return pts;
}

function nextRaceLetter(){ if(R.bag.length===0) R.bag = shuffle([...LETTER_KEYS]); return R.bag.pop(); }
function startRace(){ actx(); show('race'); R.bag = []; buildLanes(); raceRound(); }

function buildLanes(){
  const box = $('#rLanes'); box.innerHTML = '';
  RACERS.forEach((rc,i)=>{
    const lane = document.createElement('div'); lane.className = 'lane';
    lane.innerHTML = `<span class="lane-name" style="color:${rc.color}">${rc.name}</span>`+
      `<div class="lane-track"><div class="lane-car" id="laneCar${i}">${carSVG(rc.color)}</div></div>`+
      `<span class="lane-flag">🏁</span>`;
    box.appendChild(lane);
  });
}
function setLane(i, p){
  const c = document.getElementById('laneCar'+i); if(!c) return;
  p = Math.max(0, Math.min(1, p));
  c.style.left = `calc(${(p*100).toFixed(1)}% - ${(p*40).toFixed(0)}px)`;
}

function raceRound(){
  R.locked = true; R.dragging = false; R.racing = false; R.finished = false;
  cancelAnimationFrame(R.raf); R.next = 0;
  $('#rNext').classList.add('hidden');
  R.target = nextRaceLetter();
  const d = TRACE_PATHS[R.target] || TRACE_PATHS.o;
  $('#rRoad').setAttribute('d', d); $('#rDash').setAttribute('d', d);
  buildRaceArrows(d); buildRaceDots(d);
  RACERS.forEach((_,i)=> setLane(i, 0));
  // opponents get their OWN random finish times (7–15s), independent of the child
  R.opps = RACERS.map((rc,i)=> rc.you ? null : { i, t: 7 + Math.random()*8 }).filter(Boolean);
  requestAnimationFrame(()=>{ placeRaceMarkers(); placeCarAtStart(); });
  $('#rPrompt').textContent = '👂 Listen…';
  // listen first (frozen), then a traffic-light START, then everyone races at GO
  playLetterTriad(R.target, ()=>{ $('#rPrompt').innerHTML = 'On your marks… 🚦'; runCountdown(startRaceAtGo); });
}

// GREEN light: the child AND all opponents start at the same instant
function startRaceAtGo(){
  R.locked = false; R.racing = true; R.finished = false; R.startTime = performance.now();
  $('#rPrompt').innerHTML = '🏁 GO! Trace to the finish!';
  cancelAnimationFrame(R.raf); R.raf = requestAnimationFrame(raceTick);
}

function buildRaceDots(d){
  const g = $('#rDots'); g.innerHTML = ''; R.dots = [];
  subPaths(d).forEach(sd=>{
    sampleAlong('#rSvg', sd, 30).forEach(p=>{
      const pos = document.createElementNS(NS,'g');
      pos.setAttribute('transform', `translate(${p.x.toFixed(1)} ${p.y.toFixed(1)})`);
      const dot = document.createElementNS(NS,'g'); dot.setAttribute('class','food-dot');
      const c = document.createElementNS(NS,'circle'); c.setAttribute('r','4.5'); c.setAttribute('fill','#ffffff'); c.setAttribute('opacity','.95');
      dot.appendChild(c); pos.appendChild(dot); g.appendChild(pos);
      R.dots.push({ el:dot, done:false });
    });
  });
  R.total = R.dots.length; R.next = 0;
}

function buildRaceArrows(d){
  const g = $('#rArrows'); g.innerHTML = '';
  subPaths(d).forEach(sd=>{
    const tp = document.createElementNS(NS,'path'); tp.setAttribute('d', sd);
    tp.setAttribute('visibility','hidden'); $('#rSvg').appendChild(tp);
    const len = tp.getTotalLength();
    const fracs = len < 20 ? [] : len < 60 ? [0.5] : [0.2, 0.55, 0.9];
    fracs.forEach(fr=>{
      const l = len*fr, p = tp.getPointAtLength(l), p2 = tp.getPointAtLength(Math.min(len, l+3));
      const ang = Math.atan2(p2.y-p.y, p2.x-p.x)*180/Math.PI;
      const a = document.createElementNS(NS,'path');
      a.setAttribute('d','M-4 -6 L7 0 L-4 6 Z'); a.setAttribute('fill','#ffd24d'); a.setAttribute('opacity','.9');
      a.setAttribute('transform', `translate(${p.x.toFixed(1)} ${p.y.toFixed(1)}) rotate(${ang.toFixed(0)})`);
      g.appendChild(a);
    });
    $('#rSvg').removeChild(tp);
  });
}

function placeRaceMarkers(){
  const road = $('#rRoad'); const len = road.getTotalLength();
  const s = road.getPointAtLength(0), e = road.getPointAtLength(len);
  const st = $('#rStart'); st.setAttribute('cx', s.x); st.setAttribute('cy', s.y);
  const fn = $('#rFinish'); fn.setAttribute('x', e.x); fn.setAttribute('y', e.y);
}
function placeCarAtStart(){
  const svg = $('#rSvg'); const w = svg.getBoundingClientRect().width; if(!w) return;
  const scale = w/220; const p = $('#rRoad').getPointAtLength(0);
  const car = $('#rCar'); car.style.left = (p.x*scale)+'px'; car.style.top = (p.y*scale)+'px';
}

function moveCar(e){
  const r = $('#rWrap').getBoundingClientRect(); const car = $('#rCar');
  car.style.left = (e.clientX - r.left) + 'px';
  car.style.top  = (e.clientY - r.top)  + 'px';
  if(R.next < R.dots.length){
    const f = R.dots[R.next]; const fr = f.el.getBoundingClientRect();
    if(fr.width && Math.hypot(e.clientX-(fr.left+fr.width/2), e.clientY-(fr.top+fr.height/2)) < 30){
      f.done = true; f.el.classList.add('eaten'); R.next++;
      if(R.next >= R.dots.length) finishRace();
    }
  }
}

function raceTick(){
  if(!R.racing) return;
  if(!$('#race').classList.contains('active')){ R.racing = false; return; }
  const elapsed = (performance.now() - R.startTime)/1000;
  R.opps.forEach(o=> setLane(o.i, Math.min(1, elapsed/o.t)));
  setLane(0, R.total ? R.next/R.total : 0);
  R.raf = requestAnimationFrame(raceTick);
}

function finishRace(){
  if(R.finished) return;
  R.finished = true; R.racing = false; cancelAnimationFrame(R.raf);
  const t = (performance.now() - R.startTime)/1000;
  setLane(0, 1);
  const faster = R.opps.filter(o=> o.t < t).length;
  const rank = 1 + faster;
  let best = 0; try{ best = parseFloat(localStorage.getItem('letterRaceBest')) || 0; }catch(_){}
  if(t > 0.5 && (!best || t < best)){ best = t; try{ localStorage.setItem('letterRaceBest', best.toFixed(2)); }catch(_){} }
  if(!best) best = t;
  const place = rank===1 ? '🏆 You WON!' : rank===2 ? '🥈 2nd place!' : rank===3 ? '🥉 3rd place!' : '🏁 You finished!';
  $('#rPrompt').innerHTML = `${place} &nbsp;⏱️ ${t.toFixed(1)}s <span style="opacity:.65;font-size:.8em">best ${best.toFixed(1)}s</span>`;
  banner();
  const rr = $('#rWrap').getBoundingClientRect(); stars(rr.left + rr.width/2, rr.top + rr.height/2);
  $('#rNext').classList.remove('hidden');
}

/* drive the car (pointer = touch + mouse) */
$('#rCar').innerHTML = carSVG('#e63946');
(function(){
  const wrap = $('#rWrap');
  wrap.addEventListener('pointerdown', e=>{
    if(R.locked || R.finished) return;
    R.dragging = true; try{ wrap.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault(); moveCar(e);
  });
  wrap.addEventListener('pointermove', e=>{
    if(R.locked || R.finished || !R.dragging) return;
    e.preventDefault(); moveCar(e);
  });
  window.addEventListener('pointerup',     ()=>{ R.dragging = false; });
  window.addEventListener('pointercancel', ()=>{ R.dragging = false; });
})();
$('#rListen').addEventListener('click', ()=> playLetterTriad(R.target));
$('#rNext').addEventListener('click', raceRound);
</script>
